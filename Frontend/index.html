    <!-- Canvas particle background -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="landing__vignette" aria-hidden="true"></div>
    <div class="landing__scanlines" aria-hidden="true"></div>

    <!-- Navbar (rendered by shared.js) -->
    <header class="navbar" role="banner"></header>

    <!-- Main -->
    <main class="landing">

      <!-- ── Hero ── -->
      <section class="hero" aria-labelledby="hero-heading">
        <div class="hero__orb" aria-hidden="true"></div>

        <!-- Trophy icon -->
        <div class="hero__trophy" aria-hidden="true">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="8 21 12 17 16 21"></polyline>
            <path d="M5 3H19"></path>
            <path d="M5 3C5 3 5 10 12 10 19 10 19 3 19 3"></path>
            <path d="M5 3H3a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1"></path>
            <path d="M19 3h2a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h-1"></path>
            <line x1="12" y1="17" x2="12" y2="10"></line>
          </svg>
        </div>

        <!-- Wordmark -->
        <h1 class="hero__logo" id="hero-heading">ACHIEVELY</h1>

        <!-- Animated rule -->
        <div class="hero__rule" role="presentation"></div>

        <!-- Tagline -->
        <p class="hero__tagline">
          Hunt Smart. <em>Grind Hard.</em>
        </p>

        <!-- CTAs -->
        <div class="hero__cta">
          <a href="library.html" class="btn btn--primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>Browse Library</span>
          </a>
          <a href="profile.html" class="btn btn--secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Connect Steam</span>
          </a>
        </div>

        <!-- Stats -->
        <div class="hero__stats" aria-label="Platform statistics">
          <div class="stat">
            <span class="stat__value" data-count="500000" data-suffix="+">0+</span>
            <span class="stat__label">Achievements</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat">
            <span class="stat__value" data-count="50000" data-suffix="+">0+</span>
            <span class="stat__label">Games</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat">
            <span class="stat__value" data-count="100" data-suffix="%">0%</span>
            <span class="stat__label">Free</span>
          </div>
        </div>

        <!-- Scroll cue -->
        <div class="hero__scroll" aria-hidden="true">
          <span class="hero__scroll-text">Explore</span>
          <div class="hero__scroll-line"></div>
        </div>
      </section>

      <!-- ── Features ── -->
      <section class="features" aria-label="Features">
        <div class="features__grid">

          <!-- Populated by index.js -->
        </div>
      </section>

      <!-- ── Footer ── -->
      <footer class="footer" role="contentinfo"></footer>
    </main>
