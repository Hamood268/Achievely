<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' 'unsafe-inline';
             style-src 'self' https://fonts.googleapis.com;
             font-src https://fonts.gstatic.com;
             img-src 'self' https: data: blob:;
             connect-src 'self' http://localhost:8000 http://localhost:8000/api/v1;" />

  <!-- ═══ SEO & Discoverability ═══════════════════════════════ -->

  <!-- Primary -->
  <title>Achievely — Hunt Every Achievement. Miss Nothing.</title>
  <meta name="description"   content="Achievely is the ultimate Steam achievement explorer. Search any game, track your personal progress, reveal hidden trophies, and never miss an unlock." />
  <meta name="keywords"      content="steam achievements, achievement tracker, game achievements, trophy hunter, achievement explorer, steam profile" />
  <meta name="author"        content="Achievely" />
  <meta name="robots"        content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical"      href="https://achievely.app/" />

  <!-- Open Graph (Facebook, Discord, Slack, LinkedIn) -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Achievely" />
  <meta property="og:title"       content="Achievely — Hunt Every Achievement. Miss Nothing." />
  <meta property="og:description" content="Achievely is the ultimate Steam achievement explorer. Search any game, track your personal progress, reveal hidden trophies, and never miss an unlock." />
  <meta property="og:url"         content="https://achievely.app/" />
  <meta property="og:image"       content="https://achievely.app/og/home.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"   content="Achievely — Steam Achievement Explorer" />
  <meta property="og:locale"      content="en_US" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@achievely" />
  <meta name="twitter:creator"     content="@achievely" />
  <meta name="twitter:title"       content="Achievely — Hunt Every Achievement. Miss Nothing." />
  <meta name="twitter:description" content="Achievely is the ultimate Steam achievement explorer. Search any game, track your personal progress, reveal hidden trophies, and never miss an unlock." />
  <meta name="twitter:image"       content="https://achievely.app/og/home.jpg" />
  <meta name="twitter:image:alt"   content="Achievely — Steam Achievement Explorer" />

  <!-- App / PWA hints -->
  <meta name="application-name"    content="Achievely" />
  <meta name="theme-color"         content="#00d4ff" />
  <meta name="color-scheme"        content="dark" />
  <meta name="mobile-web-app-capable"      content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title"   content="Achievely" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon (inline SVG trophy in cyan — no external file needed) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='8 21 12 17 16 21'/%3E%3Cpath d='M5 3H19'/%3E%3Cpath d='M5 3C5 3 5 10 12 10 19 10 19 3 19 3'/%3E%3Cpath d='M5 3H3a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1'/%3E%3Cpath d='M19 3h2a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h-1'/%3E%3Cline x1='12' y1='17' x2='12' y2='10'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23050d1a'/%3E%3Cg fill='none' stroke='%2300d4ff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='8 21 12 17 16 21'/%3E%3Cpath d='M5 3H19'/%3E%3Cpath d='M5 3C5 3 5 10 12 10 19 10 19 3 19 3'/%3E%3Cpath d='M5 3H3a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1'/%3E%3Cpath d='M19 3h2a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h-1'/%3E%3Cline x1='12' y1='17' x2='12' y2='10'/%3E%3C/g%3E%3C/svg%3E" />

  <!-- Sitemap reference -->
  <link rel="sitemap" type="application/xml" href="https://achievely.app/sitemap.xml" />

  <!-- Schema.org structured data -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Achievely",
  "url": "https://achievely.app",
  "description": "Steam achievement explorer \u2014 track progress, reveal hidden trophies, and hunt every achievement.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://achievely.app/library.html?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
  </script>

  <!-- ═════════════════════════════════════════════════════════ -->


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/shared.css" />
  <link rel="stylesheet" href="./styles/index.css" />
</head>
<body>

  <!-- Canvas particle background -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="landing__vignette" aria-hidden="true"></div>
  <div class="landing__scanlines" aria-hidden="true"></div>

  <!-- Navbar (rendered by shared.js) -->
  <header class="navbar" role="banner"></header>

  <!-- Main -->
  <main class="landing">

    <!-- ── Hero ── -->
    <section class="hero" aria-labelledby="hero-heading">
      <div class="hero__orb" aria-hidden="true"></div>

      <!-- Trophy icon -->
      <div class="hero__trophy" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 21 12 17 16 21"/>
          <path d="M5 3H19"/>
          <path d="M5 3C5 3 5 10 12 10 19 10 19 3 19 3"/>
          <path d="M5 3H3a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1"/>
          <path d="M19 3h2a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h-1"/>
          <line x1="12" y1="17" x2="12" y2="10"/>
        </svg>
      </div>

      <!-- Wordmark -->
      <h1 class="hero__logo" id="hero-heading">ACHIEVELY</h1>

      <!-- Animated rule -->
      <div class="hero__rule" role="presentation"></div>

      <!-- Tagline -->
      <p class="hero__tagline">
        Hunt every achievement. <em>Miss nothing.</em>
      </p>

      <!-- CTAs -->
      <div class="hero__cta">
        <a href="library.html" class="btn btn--primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          <span>Browse Library</span>
        </a>
        <a href="profile.html" class="btn btn--secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Connect Steam</span>
        </a>
      </div>

      <!-- Stats -->
      <div class="hero__stats" aria-label="Platform statistics">
        <div class="stat">
          <span class="stat__value" data-count="500000" data-suffix="+">0+</span>
          <span class="stat__label">Achievements</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat__value" data-count="50000" data-suffix="+">0+</span>
          <span class="stat__label">Games</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat__value" data-count="100" data-suffix="%">0%</span>
          <span class="stat__label">Free</span>
        </div>
      </div>

      <!-- Scroll cue -->
      <div class="hero__scroll" aria-hidden="true">
        <span class="hero__scroll-text">Explore</span>
        <div class="hero__scroll-line"></div>
      </div>
    </section>

    <!-- ── Features ── -->
    <section class="features" aria-label="Features">
      <div class="features__grid">
        <!-- Populated by index.js -->
      </div>
    </section>

    <!-- ── Footer ── -->
    <footer class="footer" role="contentinfo"></footer>

  </main>

  <!-- Scripts -->
  <script src="./scripts/shared.js"></script>
  <script src="./scripts/index.js"></script>
</body>
</html>
