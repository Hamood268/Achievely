  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles/library.css" />

<body>

  <!-- Navbar (rendered by shared.js) -->
  <header class="navbar" role="banner"></header>

  <main class="library-page">

    <!-- ══════════════════════════════════════
         SEARCH BAR
    ══════════════════════════════════════ -->
    <div class="search-wrap" role="search">
      <form class="search-form" id="search-form" autocomplete="off" aria-label="Search games">

        <label class="search-icon" for="search-input" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </label>

        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Search games…"
          maxlength="120"
          aria-label="Search games"
          spellcheck="false"
        />

        <button
          type="button"
          id="search-clear"
          class="search-clear"
          aria-label="Clear search"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <button type="submit" class="search-btn" aria-label="Submit search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </form>

      <p class="search-hint" aria-hidden="true">
        Press <kbd>/</kbd> to focus &nbsp;·&nbsp; <kbd>Esc</kbd> to clear
      </p>
    </div>

    <!-- ══════════════════════════════════════
         SEARCH RESULTS (shown when active)
    ══════════════════════════════════════ -->
    <section
      id="search-results"
      class="search-results"
      aria-label="Search results"
      aria-live="polite"
    >
      <div class="search-results__header">
        <h2 class="search-results__title" id="search-results-title">Results</h2>
        <span class="search-results__count" id="search-count" aria-live="polite"></span>
        <button
          class="btn btn--sm search-results__back"
          id="search-back-btn"
          type="button"
          aria-label="Back to browse"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Browse
        </button>
      </div>

      <!-- Grid populated by library.js -->
      <div id="search-grid" class="search-grid" role="list" aria-label="Search results grid"></div>
    </section>

    <!-- ══════════════════════════════════════
         HOME CONTENT (trending + recent)
    ══════════════════════════════════════ -->
    <div id="home-content" class="home-content">

      <!-- ── Trending ── -->
      <section class="scroll-section" aria-labelledby="trending-title">
        <div class="section-header">
          <h2 class="section-title" id="trending-title">
            <span class="section-title__accent" aria-hidden="true"></span>
            Trending
          </h2>
          <button type="button" class="section-viewall" data-scroll="trending-track" aria-label="Scroll trending games">
            View all
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>
        </div>

        <div class="scroll-track-wrap">
          <div id="trending-track" class="scroll-track" role="list" aria-label="Trending games">
            <!-- Populated by library.js -->
          </div>
        </div>
      </section>

      <!-- ── Recently Added ── -->
      <section class="scroll-section" aria-labelledby="recent-title">
        <div class="section-header">
          <h2 class="section-title" id="recent-title">
            <span class="section-title__accent" aria-hidden="true"></span>
            Recently Added
          </h2>
          <button type="button" class="section-viewall" data-scroll="recent-track" aria-label="Scroll recently added games">
            View all
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>
        </div>

        <div class="scroll-track-wrap">
          <div id="recent-track" class="scroll-track" role="list" aria-label="Recently added games">
            <!-- Populated by library.js -->
          </div>
        </div>
      </section>

      <!-- ── Upcoming Games ── -->
      <section class="scroll-section" aria-labelledby="upcoming-title">
        <div class="section-header">
          <h2 class="section-title" id="upcoming-title">
            <span class="section-title__accent" aria-hidden="true"></span>
            Upcoming Games
          </h2>
          <button type="button" class="section-viewall" data-scroll="upcoming-track" aria-label="Scroll upcoming games">
            View all
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>
        </div>

        <div class="scroll-track-wrap">
          <div id="upcoming-track" class="scroll-track" role="list" aria-label="Upcoming games">
            <!-- Populated by library.js -->
          </div>
        </div>
      </section>


    </div><!-- /home-content -->

  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo"></footer>

  <script>

    window.ACHIEVELY_API = window.ACHIEVELY_API || '/api/v1';
  </script>
  <script src="./scripts/shared.js"></script>
  <script src="./scripts/library.js"></script>

</body>
</html>
