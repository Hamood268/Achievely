  <meta name="twitter:image"       content="https://i.ibb.co/KxB6WF10/Achievely-OG.png" />
  <meta name="twitter:image:alt"   content="Achievely — Steam Achievement Explorer" />

  <!-- App / PWA hints -->
  <meta name="application-name"    content="Achievely" />

  <meta name="color-scheme"        content="dark" />
  <meta name="mobile-web-app-capable"      content="yes" />

  <link rel="icon" type="image/png" sizes="196x196" href="icons/favicon-196.png">

  "url": "https://achievely.onrender.com/game.html",

    "@type": "WebSite",
    "url": "https://achievely.onrender.com"

  <!-- ═════════════════════════════════════════════════════════ -->


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/shared.css" />
  <link rel="stylesheet" href="./styles/game.css" />
</head>
<body>

  <!-- Navbar (rendered by shared.js) -->
  <header class="navbar" role="banner"></header>

  <main class="game-page">

    <!-- ══════════════════════════════════════
         HERO (skeleton → real content via JS)
    ══════════════════════════════════════ -->
    <div id="hero-wrap"></div>

    <!-- ══════════════════════════════════════
         GAME SEARCH BAR
    ══════════════════════════════════════ -->
    <div id="game-search-wrap" class="game-search-wrap" role="search" aria-label="Search another game"></div>

    <!-- ══════════════════════════════════════
         METADATA STRIP
    ══════════════════════════════════════ -->
    <div id="meta-wrap"></div>

    <!-- ══════════════════════════════════════
         DESCRIPTION
    ══════════════════════════════════════ -->
    <div id="description-wrap"></div>

    <!-- ══════════════════════════════════════
         SCREENSHOTS (price pill overlaid inside)
    ══════════════════════════════════════ -->
    <div id="screenshots-wrap"></div>

    <!-- ══════════════════════════════════════
         DLCs
    ══════════════════════════════════════ -->
    <div id="dlc-wrap"></div>

    <!-- ══════════════════════════════════════
         STEAM ID BANNER (no Steam ID state)
    ══════════════════════════════════════ -->
    <div id="steam-banner-wrap"></div>

    <!-- ══════════════════════════════════════
         ACHIEVEMENTS SECTION
    ══════════════════════════════════════ -->
    <section
      id="achievements"
      class="achievements-section"
      aria-labelledby="achievements-heading"
    >
      <!-- Header row -->
      <div class="achievements-header">
        <div class="achievements-title-row">
          <h2 class="achievements-title" id="achievements-heading">Achievements</h2>
          <span
            class="achievements-count"
            id="achievements-count"
            aria-live="polite"
          ></span>
        </div>
      </div>

      <!-- Completion bar (only shown when SteamID present) -->
      <div
        class="completion-bar-wrap"
        id="completion-bar-wrap"
        style="display:none"
        aria-label="Completion progress"
      >
        <div class="completion-pct text-mono" id="completion-pct">0%</div>
        <div class="completion-bar-info">
          <div class="completion-bar-label" id="completion-bar-label">0 / 0 unlocked</div>
          <div class="progress-bar">
            <div
              class="progress-bar__fill"
              id="completion-bar-fill"
              style="width:0%"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
            ></div>
          </div>
        </div>
      </div>

      <!-- Controls: filter tabs + sort -->
      <div class="achievements-controls">
        <!-- Filter tabs: All / Normal / Hidden (same as explorer) -->
        <div
          class="filter-tabs"
          role="tablist"
          aria-label="Filter achievements"
        >
          <button
            class="filter-tab active"
            data-filter="all"
            role="tab"
            aria-selected="true"
            type="button"
          >All</button>
          <button
            class="filter-tab"
            data-filter="normal"
            role="tab"
            aria-selected="false"
            type="button"
          >Normal</button>
          <button
            class="filter-tab"
            data-filter="hidden"
            role="tab"
            aria-selected="false"
            type="button"
          >Hidden</button>
        </div>

        <!-- Sort -->
        <select
          id="sort-select"
          class="sort-select"
          aria-label="Sort achievements"
        >
          <option value="rarity">Sort: Rarity</option>
          <option value="name">Sort: Name</option>
          <option value="date">Sort: Unlock Date</option>
        </select>
      </div>

      <!-- Achievement grid (populated by game.js) -->
      <div
        id="achievements-grid"
        class="achievements-grid"
        aria-live="polite"
        aria-label="Achievements list"
      >
        <!-- Skeletons shown initially -->
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo"></footer>

  <!-- Lightbox (built by game.js buildLightbox()) -->

  <script>
    window.ACHIEVELY_API = window.ACHIEVELY_API || '/api/v1';
  </script>
  <script src="./scripts/shared.js"></script>
  <script src="./scripts/game.js"></script>
</body>
</html>
